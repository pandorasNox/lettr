services:

  mariadb:
    # image: mariadb:11.3.2
    build:
      context: container-images/corpora/db
      dockerfile: ./Dockerfile # relative to 'context' field
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: example
    volumes:
      - ./tmp:/tmp/dumps

  adminer:
    image: adminer:5.4.2@sha256:4dae499420bb9ba8c5d73745e5c8e02b696acd214b66b5f2946eceee7f171fee
    restart: always
    ports:
      - 8066:8080

