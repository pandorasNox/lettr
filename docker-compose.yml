services:

  mariadb:
    # image: mariadb:11.3.2
    build:
      context: container-images/corpora/db
      dockerfile: ./Dockerfile # relative to 'context' field
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: example
    volumes:
      - ./tmp:/tmp/dumps

  adminer:
    image: adminer:5.4.1@sha256:3bce505927f115e80dedfa3be4c2a7c79226ae8b1994fd5bf7517d83bb8abf60
    restart: always
    ports:
      - 8066:8080

