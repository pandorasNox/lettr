services:

  mariadb:
    # image: mariadb:11.3.2
    build:
      context: container-images/corpora/db
      dockerfile: ./Dockerfile # relative to 'context' field
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: example
    volumes:
      - ./tmp:/tmp/dumps

  adminer:
    image: adminer:5.4.1@sha256:ceee80fff5c4404dfd63109d67dd3d2ccfda4111ce3c04d5ad11794c35154c8b
    restart: always
    ports:
      - 8066:8080

