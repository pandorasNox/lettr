services:
  playwright:
    image: mcr.microsoft.com/playwright:v1.50.0-noble
    volumes:
      - ./tests/playwright:/tests
    # depends_on:
    #   - lettr-app
    networks:
      - shared-network
    # entrypoint: ["npx", "playwright", "test"]
    entrypoint: sh
    command:
      - "-c"
      - "sleep $((60 * 60 * 24))"


  lettr-app:
    build: 
      context: .
      dockerfile: container-images/app/Dockerfile

    ports:
      - "8080:8080"
    networks:
      - shared-network

networks:
  shared-network:
    driver: bridge